# CI de field-verify — producto NucleoBrokers.
# Candado anti-IURIS (desacople 4-jul-2026): el build FALLA si la palabra
# "iuris" aparece en codigo o configs. docs/ queda excluido a proposito
# (ahi se narra la historia del desacople). Replicar este step en los CI
# de nucleobrokers-v3, nucleobrokers-api y zuma-maps.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  candado-anti-iuris:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Candado anti-IURIS (cero acoplamiento entre productos)
        run: |
          MATCHES=$(grep -rniE 'iuris' \
            src/ tests/ scripts/ \
            deploy.sh docker-compose.prod.yml Dockerfile pyproject.toml \
            2>/dev/null | grep -v '__pycache__' || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "::error::Candado anti-IURIS: field-verify es producto NucleoBrokers y no puede referenciar al otro producto. Corrige las lineas de arriba."
            exit 1
          fi
          echo "Candado anti-IURIS: limpio ✅"

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run test suite
        run: pytest -q
